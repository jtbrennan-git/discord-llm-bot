app = 'friend-bot-7214'
primary_region = 'lhr'

[build]

[env]
  PORT = '8080'
  MEMORY_DB_PATH = '/data/bot_memory.db'
  PROFILES_DB = '/data/bot_profiles.db'
  FEEDBACK_DB_PATH = '/data/bot_feedback.db'
  ACTION_AUDIT_DB_PATH = '/data/fellasbot_actions.db'
  STYLE_GUIDE_DB_PATH = '/data/fellasbot_style.db'
  TOPIC_LOG_DB_PATH = '/data/fellasbot_topics.db'
  CHANNEL_STATE_DB = '/data/bot_channel_state.db'

[mounts]
  source = 'fellasbot_data'
  destination = '/data'

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
