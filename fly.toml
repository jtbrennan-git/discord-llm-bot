app = 'friend-bot-7214'
primary_region = 'lhr'

[build]

[env]
  PORT = '8080'

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1